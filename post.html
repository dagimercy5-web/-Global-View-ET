<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ዝርዝር ዜና | Global View ET</title>
  
  <!-- Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Tailwind CSS + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Ethiopic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', 'Noto Sans Ethiopic', sans-serif;
      transition: background-color 0.3s ease, color 0.2s ease;
    }
    .amharic {
      font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif;
      line-height: 1.8;
      letter-spacing: 0.02em;
    }
    .english {
      font-family: 'Inter', 'Noto Sans Ethiopic', sans-serif;
    }
  </style>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#0f172a',
            accent: '#ef4444',
            lightBg: '#f8fafc',
            darkBg: '#0f172a',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300">

  <!-- HEADER -->
  <header class="bg-white dark:bg-slate-800 shadow-sm sticky top-0 z-50 border-b border-slate-200 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between flex-wrap gap-3">
      
      <!-- Logo & Brand -->
      <div class="flex items-center gap-2 flex-shrink-0">
        <img src="photo_2026-03-31_08-48-12.jpg" alt="Global View ET Logo" class="w-9 h-9 rounded-lg object-cover shadow-md">
        <div class="leading-tight">
          <span class="text-xl font-bold text-primary dark:text-white english tracking-tight">Global View ET</span>
          <span class="block text-sm font-semibold text-slate-600 dark:text-slate-300 amharic">ግሎባል ቪው ኢቲ</span>
        </div>
      </div>

      <div class="flex items-center gap-1 text-sm font-medium bg-slate-100 dark:bg-slate-700 rounded-full p-0.5">
        <a href="index.html" class="px-4 py-1.5 rounded-full bg-accent text-white shadow amharic transition text-xs font-semibold">← ወደ ዋና ገጽ</a>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div id="postContainer" class="bg-white dark:bg-slate-800 rounded-2xl p-6 md:p-10 shadow-md border border-slate-100 dark:border-slate-700">
      <p class="text-center py-10 amharic text-slate-500">ዜናው በመጫን ላይ ነው...</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-slate-900 dark:bg-slate-950 text-slate-300 mt-12 border-t border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center text-sm text-slate-400 amharic">
      © 2026 Global View ET · መብቱ በህግ የተጠበቀ ነው።
    </div>
  </footer>

  <!-- DYNAMIC POST LOADER SCRIPT -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');
      const postContainer = document.getElementById('postContainer');

      if (!postContainer) return;

      if (postId === null) {
        postContainer.innerHTML = '<p class="text-center py-10 amharic text-red-500 font-semibold">ስህተት፦ ምንም ዜና አልተመረጠም።</p>';
        return;
      }

      // ---------- ጃቫስክሪፕት ሜታ ታጎችን (Open Graph) ለማዘመን የሚጠቀምበት ፈንክሽን ----------
      function setMeta(property, content) {
        let meta = document.querySelector(`meta[property="${property}"]`);
        if (!meta) {
          meta = document.createElement('meta');
          meta.setAttribute('property', property);
          document.head.appendChild(meta);
        }
        meta.setAttribute('content', content);
      }

      function setTwitterMeta(name, content) {
        let meta = document.querySelector(`meta[name="${name}"]`);
        if (!meta) {
          meta = document.createElement('meta');
          meta.setAttribute('name', name);
          document.head.appendChild(meta);
        }
        meta.setAttribute('content', content);
      }

      fetch('news.json')
        .then(response => {
          if (!response.ok) throw new Error('news.json መጫን አልተቻለም');
          return response.json();
        })
        .then(data => {
          const post = data.posts[parseInt(postId)];
          if (post) {
            document.title = `${post.title} | Global View ET`;
            
            // የዜና መረጃዎችን ወደ ሜታ ታጎች በማስገባት ለአለም ማህበራዊ ሚዲያ ቦቶች ያስተላልፋል
            const postTitle = post.title;
            const postDesc = post.description || '';
            const postImg = post.image ? window.location.origin + post.image : window.location.origin + "/photo_2026-03-31_08-48-12.jpg";
            const postUrl = window.location.href;

            setMeta('og:title', postTitle);
            setMeta('og:description', `${postDesc} - ዘጋቢ፦ ${post.author || 'ግሎባል ቪው'}`);
            setMeta('og:image', postImg);
            setMeta('og:url', postUrl);
            setMeta('og:type', 'article');
            
            setTwitterMeta('twitter:card', 'summary_large_image');
            setTwitterMeta('twitter:title', postTitle);
            setTwitterMeta('twitter:description', postDesc);
            setTwitterMeta('twitter:image', postImg);

            // የዜናውን ሙሉ ጽሑፍ በየአንቀጹ ይከፋፍለዋል
            const paragraphs = post.body.split('\n');
            const bodyHTML = paragraphs.map(p => {
              if (p.trim() === '') return '';
              return `<p class="mb-4 amharic text-slate-700 dark:text-slate-300 leading-relaxed text-lg">${p}</p>`;
            }).join('');

            const imageUrl = post.image ? post.image : "https://placehold.co/1200x600/1e293b/white?text=Global+View+ET";

            postContainer.innerHTML = `
              <div>
                <!-- Category & Date -->
                <div class="flex items-center gap-3 mb-4">
                  <span class="bg-accent text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">${post.category || 'ስፖርት'}</span>
                  <span class="text-sm text-slate-400">📅 ${post.date || ''}</span>
                </div>
                
                <!-- Title -->
                <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold mb-4 amharic leading-tight text-slate-900 dark:text-white">${post.title}</h1>
                
                <!-- Author -->
                <div class="text-sm text-slate-500 mb-6 amharic">👤 ዘጋቢ፦ <strong>${post.author || 'ዘጋቢ'}</strong></div>
                
                <!-- Main Image -->
                <div class="rounded-2xl overflow-hidden mb-8 shadow-md">
                  <img src="${imageUrl}" alt="${post.title}" class="w-full h-auto max-h-[500px] object-cover">
                </div>
                
                <!-- Body Text -->
                <div class="prose max-w-none mt-6">
                  ${bodyHTML}
                </div>

                <!-- LIKE & SHARE BAR -->
                <div class="flex flex-wrap items-center justify-between border-t border-b border-slate-200 dark:border-slate-700 py-4 my-8 gap-4">
                  <div class="flex items-center gap-2">
                    <button id="likeBtn" class="flex items-center gap-2 bg-slate-100 dark:bg-slate-700 hover:bg-red-100 dark:hover:bg-red-900/30 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-full transition focus:outline-none">
                      <span class="text-xl">❤️</span>
                      <span id="likeCount" class="font-bold text-sm">0</span>
                    </button>
                  </div>
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-sm font-semibold text-slate-500 dark:text-slate-400 amharic mr-1">አጋራ (Share)፦</span>
                    <a id="shareTelegram" href="#" target="_blank" class="bg-sky-500 hover:scale-105 transition text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1.5">💬 Telegram</a>
                    <a id="shareFacebook" href="#" target="_blank" class="bg-blue-600 hover:scale-105 transition text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1.5">📘 Facebook</a>
                  </div>
                </div>

                <!-- COMMENTS SECTION -->
                <div class="mt-10 border-t border-slate-200 dark:border-slate-700 pt-8">
                  <h3 class="text-xl font-bold mb-4 amharic text-slate-900 dark:text-white">የአንባቢዎች አስተያየት (Comments)</h3>
                  
                  <form id="commentForm" class="flex flex-col gap-3 mb-8">
                    <input type="text" id="commenterName" required placeholder="ስምዎን ያስገቡ" class="px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white amharic outline-none focus:ring-2 focus:ring-accent">
                    <textarea id="commentText" required rows="3" placeholder="አስተያየትዎን እዚህ ይጻፉ..." class="px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white amharic outline-none focus:ring-2 focus:ring-accent"></textarea>
                    <button type="submit" class="bg-accent text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-red-600 transition w-fit amharic">አስተያየት ስጥ</button>
                  </form>
                  
                  <div id="commentsList" class="space-y-4">
                    <p class="text-sm text-slate-500 amharic" id="noComments">እስካሁን ምንም አስተያየት አልተሰጠም። የመጀመሪያው ይሁኑ!</p>
                  </div>
                </div>
                
                <!-- Back Button -->
                <div class="mt-10 border-t border-slate-200 dark:border-slate-700 pt-6">
                  <a href="index.html" class="inline-flex items-center gap-2 bg-slate-900 dark:bg-slate-700 text-white px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-accent transition amharic">← ወደ ዋና ገጽ ተመለስ</a>
                </div>
              </div>
            `;

            // SHARE LOGIC
            const currentUrl = encodeURIComponent(window.location.href);
            const shareText = encodeURIComponent(post.title);
            document.getElementById('shareTelegram').href = `https://t.me/share/url?url=${currentUrl}&text=${shareText}`;
            document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;

            // LIKE LOGIC
            const likeBtn = document.getElementById('likeBtn');
            const likeCountSpan = document.getElementById('likeCount');
            const storageLikeKey = `likes_post_${postId}`;
            
            let likes = parseInt(localStorage.getItem(storageLikeKey)) || 0;
            likeCountSpan.textContent = likes;

            likeBtn.addEventListener('click', () => {
              likes += 1;
              localStorage.setItem(storageLikeKey, likes);
              likeCountSpan.textContent = likes;
              likeBtn.classList.add('scale-110', 'text-red-500');
              setTimeout(() => likeBtn.classList.remove('scale-110'), 200);
            });

            // COMMENTS LOGIC
            const commentForm = document.getElementById('commentForm');
            const commentsList = document.getElementById('commentsList');
            const storageCommentKey = `comments_post_${postId}`;

            function loadComments() {
              const savedComments = JSON.parse(localStorage.getItem(storageCommentKey)) || [];
              if (savedComments.length > 0) {
                commentsList.innerHTML = '';
                savedComments.forEach(comment => {
                  const div = document.createElement('div');
                  div.className = "bg-slate-100 dark:bg-slate-700 p-4 rounded-xl border border-slate-200 dark:border-slate-600";
                  div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                      <span class="font-bold text-sm text-slate-800 dark:text-white amharic">👤 ${comment.name}</span>
                      <span class="text-xs text-slate-400">${comment.time}</span>
                    </div>
                    <p class="text-sm text-slate-700 dark:text-slate-300 amharic">${comment.text}</p>
                  `;
                  commentsList.appendChild(div);
                });
              }
            }

            loadComments();

            commentForm.addEventListener('submit', (e) => {
              e.preventDefault();
              const nameInput = document.getElementById('commenterName');
              const textInput = document.getElementById('commentText');

              const newComment = {
                name: nameInput.value,
                text: textInput.value,
                time: new Date().toLocaleDateString('am-ET')
              };

              const savedComments = JSON.parse(localStorage.getItem(storageCommentKey)) || [];
              savedComments.push(newComment);
              localStorage.setItem(storageCommentKey, JSON.stringify(savedComments));

              nameInput.value = '';
              textInput.value = '';
              loadComments();
            });

          } else {
            postContainer.innerHTML = '<p class="text-center py-10 amharic text-red-500 font-semibold">ይቅርታ፣ የተፈለገው ዜና አልተገኘም።</p>';
          }
        })
        .catch(err => {
          console.error(err);
          postContainer.innerHTML = '<p class="text-center py-10 amharic text-red-500 font-semibold">ዜናውን መጫን አልተቻለም።</p>';
        });
    });
  </script>
</body>
</html>
